appId: com.scytales.av
---
# End-to-End Test: Complete Issuance and Verification Flow
# This test runs the complete user journey from onboarding to credential verification

# ===============================================
# PART 1: CREDENTIAL ISSUANCE FLOW
# ===============================================

- launchApp:
    clearState: true

# Step 1: Skip Welcome Screen
- tapOn:
    text: "Skip"

# Step 2: Accept all consent checkboxes
- tapOn:
    text: "I accept the Terms of Service"
- tapOn:
    text: "I have read the data protection notice"
- tapOn:
    text: "I consent to the processing of my personal data.*"

# Step 3: Tap Next on consent screen
- tapOn:
    text: "Next"

# Step 4: Enter PIN (159753) - auto-advances when complete
- tapOn:
    index: 0
- inputText: "246813"

# Step 5: Wait for confirm PIN screen to appear
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Confirm your PIN"
    timeout: 5000

# Step 6: Repeat PIN (159753) - auto-advances when complete
- tapOn:
    index: 0
- inputText: "246813"

# Step 7: Wait for biometric setup screen
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Skip"
    timeout: 5000

# Step 8: Skip biometric setup
- tapOn:
    text: "Skip"

# Step 9: Choose National eID enrollment method
- tapOn:
    text: "National eID / National IDP"

# Wait for browser to open
- waitForAnimationToEnd

# Step 10: Handle Chrome welcome screen if it appears
- runFlow:
    when:
      visible: "Use without an account"
    commands:
      - tapOn:
          text: "Use without an account"

# Wait for issuer page to load
- waitForAnimationToEnd

# Step 11: Handle Chrome notification dialog if it appears
- runFlow:
    when:
      visible: "No thanks"
    commands:
      - tapOn:
          text: "No thanks"

# Step 12: Wait for country selection page to fully load
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Trusted Issuer"
    timeout: 30000

# Step 12b: Wait for Submit button and click it
- extendedWaitUntil:
    visible:
      text: "Submit"
    timeout: 10000
- tapOn:
    text: "Submit"

# Step 13: Wait for credential page to load (with Age Over 18 toggle)
- waitForAnimationToEnd
- waitForAnimationToEnd
- scroll
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Age Over 18"
    timeout: 30000

# Step 14: Toggle Age Over 18 by tapping the switch
- tapOn:
    rightOf:
      text: "Age Over 18"

# Step 15: Wait for Confirm button and click it
- extendedWaitUntil:
    visible:
      text: "Confirm"
    timeout: 10000
- tapOn:
    text: "Confirm"

# Wait for authorization page to load
- waitForAnimationToEnd

# Step 16: Scroll down to reveal Authorize button
- scroll

# Wait for Authorize button to be visible after scroll
- extendedWaitUntil:
    visible:
      text: "Authorize"
    timeout: 30000

# Tap Authorize button
- tapOn:
    text: "Authorize"

# Step 17: Wait for app to return and show success (credential issuance completion)
- extendedWaitUntil:
    visible:
      text: ".*[Ss]uccess.*"
    timeout: 30000

# Step 18: Verify success message and close
- assertVisible:
    text: ".*successfully.*"
- tapOn:
    text: "Close"

# Wait to ensure we're back on the main screen
- waitForAnimationToEnd

# Step 18a: Verify credential count shows 30 attestations on landing page
- extendedWaitUntil:
    visible:
      text: "30 left"
    timeout: 10000
- assertVisible:
    text: "30 left"

# ===============================================
# PART 2: CREDENTIAL VERIFICATION FLOW
# ===============================================

# Step 19: Navigate to verifier and select OpenID4VP
- openLink: "https://verifier.ageverification.dev"
- waitForAnimationToEnd

# Step 19a: Handle DC API / OpenID4VP selection (only on real devices with Chrome + DC API)
# If the selection screen is visible, tap OpenID4VP
- runFlow:
    when:
      visible: "OpenID4VP"
    commands:
      - tapOn:
          text: "OpenID4VP"
      - waitForAnimationToEnd
      # Scroll down to reveal the QR code and mobile login link
      - scroll
      - waitForAnimationToEnd

# Now wait for the mobile login link to appear
- extendedWaitUntil:
    visible:
      text: "For mobile login click here"
    timeout: 15000
- tapOn:
    text: "For mobile login click here"

# Handle Android app chooser dialog if multiple wallet apps are installed
- runFlow:
    when:
      visible: "Just once"
    commands:
      - tapOn:
          text: "Age Verification.*"
      - tapOn:
          text: "Just once"

# Wait for app to open with presentation request
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Share"
    timeout: 30000

# Step 17: Tap Share button
- tapOn:
    text: "Share"

# Step 18: Enter PIN (159753)
- waitForAnimationToEnd
- tapOn:
    index: 0
- inputText: "246813"

# Wait for authentication and success screen
- extendedWaitUntil:
    visible:
      text: ".*[Ss]uccess.*"
    timeout: 15000

# Step 19: Verify success and close
- assertVisible:
    text: ".*successfully.*"
- tapOn:
    text: "Close"

# Wait for app to return to main screen
- waitForAnimationToEnd

# Step 19a: Verify credential count decreased to 29 (one attestation was used)
- extendedWaitUntil:
    visible:
      text: "29 left"
    timeout: 10000
- assertVisible:
    text: "29 left"

# ===============================================
# PART 3: VERIFY ATTESTATION RESULTS IN BROWSER
# ===============================================

# Step 20: Press back to return to browser showing verification results
- back

# Wait for browser results page to be visible
- waitForAnimationToEnd

# Give the server time to process and update the page
- extendedWaitUntil:
    visible:
      text: "Attestation Trustworthiness"
    timeout: 20000

# Wait a moment for page to fully render
- waitForAnimationToEnd

# Step 21: Verify all attestation checks passed
- extendedWaitUntil:
    visible:
      text: "Fully trusted"
    timeout: 10000
- assertVisible:
    text: "Issuer is trusted"
- assertVisible:
    text: "Issuer has not expired"
- assertVisible:
    text: "Age over 18 confirmed"

# Step 22: Verify all checks show as "Verified"
- assertVisible:
    text: "Verified"

# Final assertion: Test completed successfully
- assertVisible:
    text: "Attestation Trustworthiness"
