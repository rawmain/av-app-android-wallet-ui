name: Maestro E2E Tests

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        type: choice
        default: 'e2e_flow_trusted_issuer'
        options:
          - 'all'
          - 'e2e_flow_trusted_issuer'
          - 'e2e_flow_untrusted_issuer'
      device_api_level:
        description: 'Android API level for emulator'
        required: true
        type: choice
        default: '34'
        options:
          - '29'
          - '30'
          - '31'
          - '33'
          - '34'

jobs:
  maestro-e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: amyu/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo chmod 666 /dev/kvm
          sudo chown $USER /dev/kvm
          ls -la /dev/kvm

      - name: Build Demo Debug APK
        run: ./gradlew assembleDemoDebug

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "${HOME}/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ github.event.inputs.device_api_level }}
          target: default
          arch: x86
          profile: Nexus 4
          cores: 2
          ram-size: 1536M
          heap-size: 512M
          disk-size: 4096M
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -qemu -m 1536
          disable-animations: true
          force-avd-creation: false
          emulator-boot-timeout: 900
          channel: stable
          script: |
            echo "=========================================="
            echo "Device information"
            echo "=========================================="
            adb devices -l
            echo "SDK Version: $(adb shell getprop ro.build.version.sdk)"
            echo "CPU ABI: $(adb shell getprop ro.product.cpu.abi)"
            echo ""

            echo "Installing APK..."
            adb install -r app/build/outputs/apk/demo/debug/*.apk
            echo "APK installed successfully"

            echo "Starting Maestro tests..."
            export PATH="${HOME}/.maestro/bin:${PATH}"
            maestro --version

            # Determine which tests to run
            TEST_SUITE="${{ github.event.inputs.test_suite }}"

            if [ "$TEST_SUITE" = "all" ]; then
              echo "Running all Maestro tests..."
              maestro test .maestro/ --format junit --output maestro-results.xml
            else
              echo "Running Maestro test: $TEST_SUITE.yaml"
              maestro test ".maestro/${TEST_SUITE}.yaml" --format junit --output maestro-results.xml
            fi

      - name: Upload Maestro Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-results-api-${{ github.event.inputs.device_api_level }}
          path: |
            maestro-results.xml
            ~/.maestro/tests/
          retention-days: 30

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-debug-apk
          path: app/build/outputs/apk/demo/debug/*.apk
          retention-days: 7

      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: maestro-results.xml
          check_name: Maestro E2E Test Results
          comment_mode: off
