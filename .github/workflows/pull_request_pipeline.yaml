name: PR checks

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  dependency-check:
    runs-on: ubuntu-22.04

    steps:
      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'AV Android Wallet'
          path: '.'
          format: 'HTML'
          args: >
            --failOnCVSS 7
            --disableBundleAudit
            --disableCarthageAnalyzer
            --disableSwiftPackageManagerAnalyzer
            --disableSwiftPackageResolvedAnalyzer	
            --disableGolangDep
            --disableGolangMod
            --disableAssembly
            --disableMixAudit
            --disablePyDist
            --disablePyPkg
            --disableMSBuild
            --disableRubygems
            --disableCocoapodsAnalyzer
            --disableCmake
            --disableDart
            --disableCpan
            --disableComposer
            --disableNugetconf
            --disableNuspec
            --disablePoetry
        timeout-minutes: 25

      - name: Upload OWASP Dependency-Check results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-results
          path: '**/dependency-check-report.*'
          retention-days: 20

  lint-test-build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: amyu/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Check TLS pin-set expiration
        run: |
          python3 - <<'EOF'
          import re, sys
          from datetime import date, timedelta

          WARN_DAYS = 120
          config = open("network-logic/src/main/res/xml/network_security_config.xml").read()
          dates = re.findall(r'expiration="(\d{4}-\d{2}-\d{2})"', config)
          if not dates:
              print("WARNING: No pin-set expiration dates found in network_security_config.xml")
              sys.exit(0)
          threshold = date.today() + timedelta(days=WARN_DAYS)
          failed = False
          for d in dates:
              exp = date.fromisoformat(d)
              if exp <= threshold:
                  print(f"ERROR: TLS pin-set expires {d}, which is within {WARN_DAYS} days. Rotate pins before this date.")
                  failed = True
          if failed:
              sys.exit(1)
          print(f"TLS pin-set expiration check passed. Earliest expiry: {min(dates)}")
          EOF

      - name: Check CSCA keystore integrity constant
        run: |
          python3 - <<'EOF'
          import hashlib, re, sys

          asset = "passport-scanner/src/main/assets/csca.ks"
          source = "passport-scanner/src/main/java/eu/europa/ec/passportscanner/nfc/NFCFragment.kt"

          actual = hashlib.sha256(open(asset, "rb").read()).hexdigest()
          code = open(source).read()
          match = re.search(r'val expected = "([0-9a-f]{64})"', code)
          if not match:
              print("ERROR: Could not find expected SHA-256 constant in NFCFragment.kt")
              sys.exit(1)
          expected = match.group(1)
          if actual != expected:
              print(f"ERROR: csca.ks hash mismatch. File: {actual}  Constant: {expected}")
              print("Update verifyCscaIntegrity() in NFCFragment.kt to match the new asset.")
              sys.exit(1)
          print(f"csca.ks integrity constant is up-to-date ({actual[:16]}...)")
          EOF

      - name: Run lint check
        run: ./gradlew lint

      - name: Run unit tests
        run: ./gradlew testDevDebugUnitTest

      - name: Run tests with coverage
        run: ./gradlew koverHtmlReportDevDebug

      - name: Upload test results only on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/reports/kover
          retention-days: 20

      - name: Build DEV debug APK
        run: ./gradlew assembleDevDebug
